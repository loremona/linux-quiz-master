<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0b0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🐧 Linux Dojo — LPIC-1</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐧</text></svg>">
<link rel="apple-touch-icon" href="icons/icon.svg">
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ════════ HOME ════════ -->
<div id="home" class="screen">
  <header class="home-header">
    <div class="logo">🐧 <span>LINUX</span> DOJO</div>
    <div class="header-actions">
      <button class="btn-header-icon" id="btnTheme" onclick="toggleTheme()" title="Tema chiaro/scuro">🌙</button>
      <button class="btn-header-icon" onclick="openStats()" title="Statistiche">📊</button>
      <div class="streak-pill" id="streakPill">🔥 0</div>
    </div>
  </header>

  <div class="level-card">
    <div class="level-emoji" id="levelEmoji">🥚</div>
    <div class="level-info">
      <div class="level-name" id="levelName">Pinguino Neonato</div>
      <div class="xp-bar"><div class="xp-fill" id="xpFill"></div></div>
      <div class="xp-text" id="xpText">0 XP</div>
    </div>
  </div>

  <div class="daily-msg" id="dailyMsg"></div>

  <h2 class="section-title">📚 I tuoi moduli</h2>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="searchInput" class="search-input" type="search"
      placeholder="Cerca tra le card..." autocomplete="off" autocapitalize="off"
      autocorrect="off" spellcheck="false">
  </div>
  <div id="searchResults" class="search-results hidden"></div>
  <div id="moduleList" class="module-list"></div>

  <footer class="home-footer">LPIC-1 · made with 🧠 + ☕</footer>
</div>

<!-- ════════ FEED (le card stile TikTok) ════════ -->
<div id="feed" class="screen hidden">
  <div class="feed-topbar">
    <button class="btn-icon" id="btnExit">✕</button>
    <div class="feed-progress"><div class="feed-progress-fill" id="feedProgressFill"></div></div>
    <div class="feed-xp" id="feedXp">⚡ 0</div>
  </div>
  <div id="cards" class="cards"></div>
  <div class="swipe-hint" id="swipeHint">scorri in su per continuare ⬆️</div>
</div>

<!-- ════════ Coriandoli ════════ -->
<canvas id="confetti"></canvas>

<!-- ════════ Toast XP ════════ -->
<div id="toast" class="toast hidden"></div>

<!-- ════════ Stats modale ════════ -->
<div id="stats-overlay" class="hidden">
  <div class="cs-header">
    <div class="cs-title">📊 Le tue statistiche</div>
    <button class="cs-close" onclick="closeStats()">✕</button>
  </div>
  <div class="stats-body" id="stats-body"></div>
</div>

<!-- ════════ Cheatsheet modale ════════ -->
<div id="cheatsheet-overlay" class="hidden">
  <div class="cs-header">
    <div class="cs-title" id="cs-title">Cheatsheet</div>
    <button class="cs-close" onclick="closeCheatsheet()">✕</button>
  </div>
  <div class="cs-body" id="cs-body"></div>
</div>

<script src="js/data/module01.js"></script>
<script src="js/data/module02.js"></script>
<script src="js/data/module03.js"></script>
<script src="js/data/module04.js"></script>
<script src="js/data/module05.js"></script>
<script src="js/data/module06.js"></script>
<script src="js/data/module07.js"></script>
<script src="js/data/module08.js"></script>
<script src="js/data/module09.js"></script>
<script src="js/data/module10.js"></script>
<script src="js/cheatsheets.js"></script>
<script src="js/modules.js"></script>
<!-- Supabase (sync profilo). SICUREZZA: prima di usarlo online, pinna una versione esatta
     e aggiungi integrity="sha384-…". Genera l'hash con:
       curl -s https://cdn.jsdelivr.net/npm/@supabase/supabase-js@<VERSIONE>/dist/umd/supabase.min.js | openssl dgst -sha384 -binary | openssl base64 -A
     poi sostituisci @2 con @<VERSIONE> e aggiungi l'attributo integrity. -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" crossorigin="anonymous"></script>
<script src="js/config.js"></script>
<script src="js/sync.js"></script>
<script src="js/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js', { scope: './' })
      .catch(() => {});
  }
</script>
</body>
</html>
